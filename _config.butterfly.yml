# butterfly主题配置 - 亦然亦航双胞胎成长博客

# ===============================
# 导航菜单
# ===============================
menu:
  首页: / || fas fa-home
  成长日记: /categories/ || fas fa-book-open
  兴趣爱好: /tags/ || fas fa-heart
  时间线: /archives/ || fas fa-timeline
  相册: /gallery/ || fas fa-images
  关于我们: /about/ || fas fa-info-circle

# ===============================
# 网站基本信息
# ===============================
title: 亦然亦航
subtitle: 双胞胎男孩的成长日记
description: 记录双胞胎男孩亦然与亦航从幼儿园到大学的成长历程
keywords: 双胞胎,成长博客,儿童成长,亦然亦航
author: 亦然亦航
language: zh-CN

# ===============================
# 主题色 - 可爱的蓝色系
# ===============================
theme_color:
  enable: true
  main: "#5DADE2"
  paginator: "#5DADE2"
  button_hover: "#FF6B9D"
  text_selection: "#5DADE2"
  link_color: "#3498DB"
  link_hover: "#FF6B9D"
  dark_mode:
    main: "#5DADE2"
    paginator: "#5DADE2"
    button_hover: "#FF6B9D"
    text_selection: "#5DADE2"
    link_color: "#5DADE2"
    link_hover: "#FF6B9D"

# ===============================
# 网站图标
# ===============================
favicon: /img/favicon.png
avatar: /img/avatar.png

# ===============================
# 顶部图
# ===============================
banner:
  enable: true
  index:
    url: /img/banner/index.jpg
  category:
    url: /img/banner/category.jpg
  tag:
    url: /img/banner/tag.jpg
  archive:
    url: /img/banner/archive.jpg

# ===============================
# 首页配置
# ===============================
index_img: /img/index_bg.jpg

# ===============================
# 文章页配置
# ===============================
post:
  enable: true
  default_index_img: /img/post-default.jpg

# ===============================
# 代码高亮
# ===============================
highlight_theme: mac
highlight_copy: true
highlight_lang: true
highlight_shrink: false
highlight_height_limit: 200

# ===============================
# 代码字体
# ===============================
code_word_wrap: false

# ===============================
# 社交图标
# ===============================
social:
  GitHub: https://github.com/1h1r || fab fa-github
  邮箱: mailto:contact@1h1r.github.io || fas fa-envelope

# ===============================
# 分类与标签
# ===============================
category_ui: 
  enable: true
  type: card

tag_ui:
  enable: true
  type: cloud

# ===============================
# 文章元信息
# ===============================
post_meta:
  page:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: relative
    categories: true
    tags: true
    label: true

# ===============================
# 字数统计
# ===============================
wordcount:
  enable: true

# ===============================
# 相关文章推荐
# ===============================
related_post:
  enable: true
  limit: 6
  date_type: created

# ===============================
# 文章过期提醒
# ===============================
post_outdated:
  enable: true
  message: 本文最后更新于[x]天前，内容可能已经过时

# ===============================
# TOC目录
# ===============================
toc:
  enable: true
  number: true
  auto_open: true
  expand: true

# ===============================
# 版权声明
# ===============================
copyright:
  enable: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# ===============================
# 暗黑模式
# ===============================
darkmode:
  enable: true
  default: auto
  button: true
  autoChangeMode: 1

# ===============================
# 阅读模式
# ===============================
readmode:
  enable: true
  auto_open: false

# ===============================
# 搜索
# ===============================
search:
  enable: true
  type: local
  tag:
    enable: true
  preload: true

# ===============================
# 评论系统
# ===============================
comments:
  enable: true
  use: giscus
  text: true
  lazyload: true
  count: true
  card_post_count: true

# Giscus评论
giscus:
  repo: 1h1r/1h1r.github.io
  repo_id:
  category: Announcements
  category_id:
  mapping: pathname
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  theme: light
  lang: zh-CN

# ===============================
# 分享
# ===============================
share:
  enable: true
  use: sharejs

# ===============================
# 右下角按钮
# ===============================
rightside:
  enable: true
  position: bottom
  percent: true
  hide: true

# ===============================
# Pjax - 无刷新加载
# ===============================
pjax:
  enable: true

# ===============================
# 页脚
# ===============================
footer:
  owner:
    enable: true
    since: 2020
  custom_text: 亦然亦航 | 用爱记录双胞胎的每一天
  copyright: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# ===============================
# 页面加载动画
# ===============================
preloader:
  enable: true
  source: 1

# ===============================
# PWA - 渐进式Web应用
# ===============================
pwa:
  enable: false

# ===============================
# 打字效果
# ===============================
activate_power_mode:
  enable: true
  colorful: true
  shake: false

# ===============================
# 背景效果
# ===============================
canvas_ribbon:
  enable: false
  size: 300
  alpha: 0.6
  zIndex: -1

canvas_ribbon_polar:
  enable: false

canvas_nest:
  enable: true
  color: "0,0,255"
  pointColor: "0,0,255"
  opacity: 0.5
  count: 50
  zIndex: -1

# ===============================
# 鼠标点击效果
# ===============================
fireworks:
  enable: true
  zIndex: 9999
  defaultIndex: 6
  path: /img/fireworks.min.js

click_heart:
  enable: false

clickShowText:
  enable: true
  text:
    - 亦然亦航
    - 快乐成长
    - 天天向上
    - 双胞胎最棒
  fontSize: 16px
  random: false
  position: center

# ===============================
# 图片懒加载
# ===============================
lazyload:
  enable: true
  field: site
  placeholder: /img/loading.gif
  blur: true

# ===============================
# 图片放大
# ===============================
fancybox:
  enable: true
  options:
    animationEffect: zoom
    transitionEffect: slide

# ===============================
# 中英文切换
# ===============================
translate:
  enable: false

# ===============================
# 简繁切换
# ===============================
traditional_and_simplified_chinese:
  enable: false

# ===============================
# 网站统计
# ===============================
busuanzi:
  enable: true
  page_pv: true
  site_pv: true
  site_uv: true

# ===============================
# 图表支持
# ===============================
mermaid:
  enable: true
  theme: default
  code_word_wrap: false

chart:
  enable: true

# ===============================
# 音乐播放器
# ===============================
aplayer:
  enable: true
  audio:
    - name: 小星星
      artist: 儿歌
      url: 
      cover: 
    - name: 虫儿飞
      artist: 儿歌
      url: 
      cover: 

# ===============================
# 数学公式
# ===============================
mathjax:
  enable: true
  per_page: false

katex:
  enable: true
  per_page: false

# ===============================
# 文章封面
# ===============================
cover:
  enable: true
  index_default: /img/cover/default.jpg
  archive_default: /img/cover/archive.jpg
  default: /img/cover/default.jpg

# ===============================
# 文章系列
# ===============================
series:
  enable: true
  group: 
    - name: 幼儿园时光
      cover: /img/cover/kindergarten.jpg
      description: 亦然亦航的幼儿园快乐时光
    - name: 小学成长
      cover: /img/cover/primary.jpg
      description: 小学六年的成长故事
    - name: 初中岁月
      cover: /img/cover/junior.jpg
      description: 青春期的初中三年
    - name: 高中冲刺
      cover: /img/cover/high.jpg
      description: 高中三年的拼搏与收获
    - name: 大学殿堂
      cover: /img/cover/college.jpg
      description: 大学四年的精彩篇章

# ===============================
# 即时页面预加载
# ===============================
instantpage:
  enable: true

# ===============================
# 通知
# ===============================
snackbar:
  enable: true
  position: bottom-right
  bglight: '#49B1F5'
  bgdark: '#1f1f1f'

# ===============================
# CSS自定义
# ===============================
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
    - <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  bottom:
    - <script src="/js/custom.js"></script>

# ===============================
# 版本
# ===============================
version: 5.5.5

<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- 背景：马里奥天空蓝 -->
  <rect width="200" height="200" rx="20" fill="#5C94FC"/>
  
  <!-- 云朵 -->
  <ellipse cx="40" cy="35" rx="20" ry="12" fill="white" opacity="0.8"/>
  <ellipse cx="160" cy="30" rx="15" ry="10" fill="white" opacity="0.8"/>
  
  <!-- 绿色管道 -->
  <rect x="75" y="120" width="50" height="60" fill="#43B047" stroke="#006400" stroke-width="3"/>
  <rect x="70" y="115" width="60" height="15" fill="#43B047" stroke="#006400" stroke-width="3" rx="3"/>
  <rect x="78" y="130" width="8" height="40" fill="#5FD05F" opacity="0.5"/>
  
  <!-- 砖块地面 -->
  <rect x="0" y="180" width="200" height="20" fill="#C84C0C"/>
  <line x1="20" y1="180" x2="20" y2="200" stroke="#8B2500" stroke-width="2"/>
  <line x1="40" y1="180" x2="40" y2="200" stroke="#8B2500" stroke-width="2"/>
  <line x1="60" y1="180" x2="60" y2="200" stroke="#8B2500" stroke-width="2"/>
  <line x1="80" y1="180" x2="80" y2="200" stroke="#8B2500" stroke-width="2"/>
  <line x1="100" y1="180" x2="100" y2="200" stroke="#8B2500" stroke-width="2"/>
  <line x1="120" y1="180" x2="120" y2="200" stroke="#8B2500" stroke-width="2"/>
  <line x1="140" y1="180" x2="140" y2="200" stroke="#8B2500" stroke-width="2"/>
  <line x1="160" y1="180" x2="160" y2="200" stroke="#8B2500" stroke-width="2"/>
  <line x1="180" y1="180" x2="180" y2="200" stroke="#8B2500" stroke-width="2"/>
  
  <!-- 问号砖块 -->
  <rect x="10" y="100" width="30" height="30" fill="#FAC000" stroke="#C84C0C" stroke-width="3" rx="3"/>
  <text x="25" y="122" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">?</text>
  
  <rect x="160" y="90" width="30" height="30" fill="#FAC000" stroke="#C84C0C" stroke-width="3" rx="3"/>
  <text x="175" y="112" font-family="Arial" font-size="20" font-weight="bold" fill="white" text-anchor="middle">?</text>
  
  <!-- 金币 -->
  <circle cx="50" cy="70" r="12" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <circle cx="50" cy="70" r="8" fill="#FFEC8B"/>
  <text x="50" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#B8860B" text-anchor="middle">$</text>
  
  <circle cx="150" cy="65" r="10" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <circle cx="150" cy="65" r="7" fill="#FFEC8B"/>
  
  <!-- 马里奥星星 -->
  <polygon points="100,50 105,65 120,65 108,75 113,90 100,80 87,90 92,75 80,65 95,65" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <circle cx="100" cy="68" r="3" fill="white" opacity="0.6"/>
  
  <!-- 博客标题文字 -->
  <text x="100" y="160" font-family="'ZCOOL KuaiLe', sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle" stroke="#C84C0C" stroke-width="1">亦然亦航</text>
</svg>

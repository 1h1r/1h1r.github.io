<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- 背景：圆角黄色渐变 -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5C94FC"/>
      <stop offset="100%" stop-color="#049CD8"/>
    </radialGradient>
    <radialGradient id="petalGrad1" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FBD000"/>
    </radialGradient>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#C84C0C"/>
    </radialGradient>
  </defs>

  <!-- 蓝色背景圆 -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>

  <!-- 向日葵花瓣（8片） -->
  <g transform="translate(32,30)">
    <!-- 花瓣 -->
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#petalGrad1)" stroke="#E45C10" stroke-width="1"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#petalGrad1)" stroke="#E45C10" stroke-width="1" transform="rotate(45)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#petalGrad1)" stroke="#E45C10" stroke-width="1" transform="rotate(90)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#petalGrad1)" stroke="#E45C10" stroke-width="1" transform="rotate(135)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#petalGrad1)" stroke="#E45C10" stroke-width="1" transform="rotate(180)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#petalGrad1)" stroke="#E45C10" stroke-width="1" transform="rotate(225)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#petalGrad1)" stroke="#E45C10" stroke-width="1" transform="rotate(270)"/>
    <ellipse cx="0" cy="-16" rx="6" ry="12" fill="url(#petalGrad1)" stroke="#E45C10" stroke-width="1" transform="rotate(315)"/>

    <!-- 花蕊 -->
    <circle cx="0" cy="0" r="9" fill="url(#centerGrad)" stroke="#8B2500" stroke-width="1.5"/>

    <!-- 笑脸 -->
    <circle cx="-3" cy="-2" r="1.5" fill="white"/>
    <circle cx="3" cy="-2" r="1.5" fill="white"/>
    <circle cx="-3" cy="-2" r="0.8" fill="#2C3E50"/>
    <circle cx="3" cy="-2" r="0.8" fill="#2C3E50"/>
    <!-- 微笑 -->
    <path d="M -3 2 Q 0 4 3 2" stroke="#2C3E50" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 小叶子 -->
  <ellipse cx="12" cy="50" rx="5" ry="3" fill="#43B047" stroke="#006400" stroke-width="1" transform="rotate(-30 12 50)"/>
  <ellipse cx="52" cy="50" rx="5" ry="3" fill="#43B047" stroke="#006400" stroke-width="1" transform="rotate(30 52 50)"/>
</svg>
